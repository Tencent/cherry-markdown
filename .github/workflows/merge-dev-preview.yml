# =============================================================================
# Merge Dev Preview — 合并到 dev 后自动发布开发预览版
#
# 触发时机: PR 合并 (closed + merged) 到 dev 分支，且变更涉及 packages/cherry-markdown 或 packages/vscodePlugin
# 功能:
#   1. npm-dev-preview: 发布 @cherry-markdown/cherry-markdown-dev 到 npm（带时间戳版本号），PR 评论安装指引
#   2. vscode-plugin-preview: 以 --pre-release 模式发布 VSCode 插件，PR 评论下载信息
# 使用 pull_request_target 安全访问 secrets（VSCE_PAT / BOT_TOKEN）
# 并发控制: 不取消旧运行（合并事件只应执行一次）
# =============================================================================

name: 'Merge Dev Preview'

on:
  pull_request_target:
    types: [closed]
    paths:
      - 'packages/cherry-markdown/**'
      - 'packages/vscodePlugin/**'

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    if: github.repository == 'Tencent/cherry-markdown' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    outputs:
      cherry-markdown: ${{ steps.filter.outputs.cherry-markdown }}
      vscode-plugin: ${{ steps.filter.outputs.vscode-plugin }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cherry-markdown:
              - 'packages/cherry-markdown/**'
            vscode-plugin:
              - 'packages/vscodePlugin/**'

  npm-dev-preview:
    needs: detect-changes
    if: needs.detect-changes.outputs.cherry-markdown == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Merge Commit SHA
        run: echo "COMMIT_SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Get Commit Message
        run: echo "COMMIT_MESSAGE=$(git log --oneline -1)" >> $GITHUB_ENV

      - name: Install dependencies
        run: sudo apt-get install -y moreutils

      - name: Update package.json
        working-directory: ./packages/cherry-markdown
        run: |
          BASE_VERSION=$(jq -r .version package.json)
          VERSION="${BASE_VERSION}-$(date +'%Y%m%d%H%M').${{ env.COMMIT_SHORT_SHA }}"
          jq --arg name "@cherry-markdown/cherry-markdown-dev" \
             --arg version "$VERSION" \
             '.name = $name | .version = $version | del(.scripts.publish?)' package.json | sponge package.json
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "PACKAGE_NAME=@cherry-markdown/cherry-markdown-dev" >> $GITHUB_ENV

      - name: Update README
        working-directory: ./packages/cherry-markdown
        run: |
          cat <<-EOF > README.md
            **⚠️ 开发预览警告 / Development Preview Warning**

            变更 / Changes: ${{ env.COMMIT_MESSAGE }}

            此版本为[临时测试版](${PACKAGE_NAME}@${PACKAGE_VERSION})，禁止在生产环境使用！

            This is a [development preview version](${PACKAGE_NAME}@${PACKAGE_VERSION}), do NOT use in production!

          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org/
          cache: yarn

      - name: Install and build
        working-directory: ./packages/cherry-markdown
        run: yarn install && yarn build

      # 使用最新 LTS (24) 执行 npm publish
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: npm publish
        working-directory: ./packages/cherry-markdown
        run: npm publish --tag latest

      - name: Post comments
        uses: actions/github-script@v7
        with:
          script: |
            const commentTemplate = `📦 **cherry-markdown dev published**
              
              ⚠️ **注意**: 此版本为开发预览版，禁止在生产环境使用！
              > 此方式引用代码中仍然可以使用 \`cherry-markdown\` 包名，不需要修改现有的 import 语句
              
              **Install [NPM](https://www.npmjs.com/package/${process.env.PACKAGE_NAME}/v/${process.env.PACKAGE_VERSION}) with** :
              \`\`\`bash
              pnpm add cherry-markdown@npm:${process.env.PACKAGE_NAME}@${process.env.PACKAGE_VERSION}
              \`\`\`

              \`\`\`bash
              yarn add cherry-markdown@npm:${process.env.PACKAGE_NAME}@${process.env.PACKAGE_VERSION}
              \`\`\`
              
              \`\`\`bash
              npm i cherry-markdown@npm:${process.env.PACKAGE_NAME}@${process.env.PACKAGE_VERSION}
              \`\`\`

              如果你使用了其他以 cherry-markdown 作为同等依赖（peer dependency）的元框架，你需要在 package.json 文件中覆盖 cherry-markdown 依赖，具体操作方式会因你使用的包管理器而略有不同

              \`\`\`json
              # npm
              { "overrides": { "cherry-markdown": "npm:${process.env.PACKAGE_NAME}@${process.env.PACKAGE_VERSION}" } }
              # yarn
              { "resolutions": { "cherry-markdown": "npm:${process.env.PACKAGE_NAME}@${process.env.PACKAGE_VERSION}" } }
              # pnpm
              { "pnpm": { "overrides": { "cherry-markdown": "npm:${process.env.PACKAGE_NAME}@${process.env.PACKAGE_VERSION}" } } }
              \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentTemplate
            });

  vscode-plugin-preview:
    needs: detect-changes
    if: needs.detect-changes.outputs.vscode-plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Prepare package.json for VSCode Plugin Preview
        run: |

          # 带时间戳版本号处理（dev preview 特有，仅修改版本号不涉及包名）
          cd packages/vscodePlugin
          TIMESTAMP=$(t=$(date +%m%d%H%M | sed 's/^0*//'); [ -n "$t" ] && printf '%s' "$t" || date +%H%M%S)

          tmp=$(mktemp) && jq --arg ts "$TIMESTAMP" '
            .version |= (
              split(".") as $s |
              if ($s|length) < 3 then
                error("package.json version must be in '\''x.y.z'\'' format")
              else
                if $s[2] == "0" then
                  ($s[0:2] + [$ts]) | join(".")
                else
                  ($s[0:2] + [($s[2] + $ts)]) | join(".")
                end
              end
            )
          ' package.json > "$tmp" && mv "$tmp" package.json

      - name: Install and Build Dependencies
        run: |
          yarn --network-timeout 100000
          yarn build

      # 编译生产产物（纯 rspack 构建）
      - name: Build VSCode Plugin (production bundle)
        run: |
          yarn workspace cherry-markdown-vscode-plugin build:prod

      # 改名为 "cherry-markdown"（VSCode Marketplace 发布名）
      - name: Prepare for VSCode publishing
        run: bash .github/scripts/prepare-vscode-plugin.sh

      - name: Publish VSCode Plugin Preview
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd packages/vscodePlugin
          # 发布 vscode 插件预览版
          npx @vscode/vsce publish -p $VSCE_PAT --no-dependencies --no-yarn --pre-release

      - name: Comment on PR with VSCode Plugin Preview Info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔌 Preview Cherry Markdown Extensions [see: prerelease-extensions](https://code.visualstudio.com/api/working-with-extensions/publishing-extension?from_column=20423&from=20423#prerelease-extensions)`
            });
