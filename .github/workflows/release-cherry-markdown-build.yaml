name: 'Build Cherry Markdown Release'

permissions:
  contents: write
  id-token: write

on:
  workflow_call:
    inputs:
      core_version:
        required: true
        type: string
jobs:
  release-npm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          yarn
          yarn build

      - name: Package dist assets
        working-directory: packages/cherry-markdown
        run: |
          tar -czvf ../cherry-markdown-${{ inputs.core_version }}.tar.gz dist/
          zip -r ../cherry-markdown-${{ inputs.core_version }}.zip dist/

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Publish cherry-markdown
        run: |
          cp README*.md packages/cherry-markdown/
           
          cd packages/cherry-markdown
          npm publish --access public

      - name: Upload dist to GitHub Release
        uses: AButler/upload-release-assets@v3.0
        with:
          files: |
            cherry-markdown-*.tar.gz;
            cherry-markdown-*.zip
          release-tag: 'cherry-markdown@${{ inputs.core_version }}'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
