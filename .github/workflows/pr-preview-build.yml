# =============================================================================
# PR Preview: Build — 构建所有预览产物
#
# 触发时机: PR 打开 / 有新推送 / 重开时自动运行
# 功能:
#   1. playground 构建 — 用于 surge.sh 在线预览
#   2. Client 全平台构建 — Tauri 桌面客户端 [macOS arm64/x64, Win x64, Linux x64]
#   3. VSCode Plugin 打包 — .vsix 文件
# 所有构建产物上传为 artifact，由 pr-preview-deploy 统一处理
# 注意: Client 和 VSCode Plugin 构建失败不影响主流程 (continue-on-error)
# 并发控制: 连续提交取消旧运行
# =============================================================================

name: 'PR Preview: Build'

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playground:
    uses: ./.github/workflows/pr-preview-build-playground.yml

  client:
    uses: ./.github/workflows/pr-preview-build-client.yml

  vscode-plugin:
    uses: ./.github/workflows/reusable-vscode-plugin.yml
    with:
      mode: package
