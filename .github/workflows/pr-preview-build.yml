# =============================================================================
# PR Preview: Build — 构建所有预览产物
#
# 触发时机: PR 打开 / 有新推送 / 重开时自动运行
# 功能:
#   1. playground 构建 — 用于 surge.sh 在线预览
#   2. Client 全平台构建 — Tauri 桌面客户端 [macOS arm64/x64, Win x64, Linux x64]
#   3. VSCode Plugin 打包 — .vsix 文件
# 所有构建产物上传为 artifact，由 pr-preview-deploy 统一处理
# 注意: Client 和 VSCode Plugin 构建失败不影响主流程 (continue-on-error)
# 并发控制: 连续提交取消旧运行
# =============================================================================

name: 'PR Preview: Build'

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ github.event.number }} > pr-id.txt
      - uses: actions/upload-artifact@v4
        with:
          name: pr-id
          path: pr-id.txt
          retention-days: 5

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: 'yarn'

      - run: yarn install

      - run: yarn build

      - run: |
          mkdir -p playground/packages/cherry-markdown
          cp -r packages/cherry-markdown/dist playground/packages/cherry-markdown
          cp -r examples/assets playground
          cp examples/*.html playground
          find playground -type f -name "*.html" -exec sed -i 's|\.\./packages|./packages|g' {} +

      - uses: actions/upload-artifact@v4
        with:
          name: playground
          path: playground
          retention-days: 5

  client-build:
    runs-on: ${{ matrix.platform }}
    continue-on-error: true
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            platform_name: macos
            arch: arm64
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            platform_name: macos
            arch: x64
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            platform_name: windows
            arch: x64
            args: '--target x86_64-pc-windows-msvc'
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_name: linux
            arch: x64
            args: '--target x86_64-unknown-linux-gnu'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          toolchain: stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/client/src-tauri -> target
          save-if: false # PR Preview 只读缓存，不保存新缓存

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Dependencies
        run: yarn --network-timeout 100000

      - name: Build Cherry Markdown
        run: yarn build

      - name: Build Tauri Client
        run: yarn build:client ${{ matrix.args }}

      # macOS: Upload DMG
      - name: Upload DMG
        if: matrix.platform_name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform_name }}-${{ matrix.arch }}-dmg
          path: ./packages/client/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 5
          if-no-files-found: warn

      # macOS: Upload App
      - name: Upload App
        if: matrix.platform_name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform_name }}-${{ matrix.arch }}-app
          path: ./packages/client/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 5
          if-no-files-found: warn

      # Windows: Upload MSI
      - name: Upload MSI
        if: matrix.platform_name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform_name }}-${{ matrix.arch }}-msi
          path: ./packages/client/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          retention-days: 5
          if-no-files-found: warn

      # Windows: Upload NSIS Exe
      - name: Upload NSIS Installer
        if: matrix.platform_name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform_name }}-${{ matrix.arch }}-exe
          path: ./packages/client/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 5
          if-no-files-found: warn

      # Linux: Upload AppImage
      - name: Upload AppImage
        if: matrix.platform_name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform_name }}-${{ matrix.arch }}-appimage
          path: ./packages/client/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 5
          if-no-files-found: warn

      # Linux: Upload Deb
      - name: Upload Deb
        if: matrix.platform_name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform_name }}-${{ matrix.arch }}-deb
          path: ./packages/client/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          retention-days: 5
          if-no-files-found: warn

  vscode-plugin-build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Prepare package.json for VSCode Plugin
        run: bash .github/scripts/prepare-vscode-plugin.sh

      - name: Install and Build Dependencies
        run: |
          yarn global add vsce
          yarn --network-timeout 100000
          yarn build
          yarn build:vscodePlugin

      - name: Package VSCode Plugin
        run: |
          cd packages/vscodePlugin
          vsce package --no-dependencies --no-yarn

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-plugin-vsix
          path: packages/vscodePlugin/*.vsix
          retention-days: 5
          if-no-files-found: warn
