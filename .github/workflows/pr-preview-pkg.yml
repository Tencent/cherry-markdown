# =============================================================================
# PR Preview: pkg-pr-new — 通过 pkg-pr-new 发布预览包
#
# 触发时机: 提交 PR 到 main 或 dev 分支时自动运行
# 功能: 使用 pkg-pr-new 将 cherry-markdown 发布到 npm 预览 registry
#       支持通过 pnpm / npm / yarn 直接引用预览版本
# =============================================================================

name: 'PR Preview: pkg-pr-new'

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkg-pr-new:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: 'yarn'

      - name: Install dependencies
        run: yarn
      - name: Build package
        run: yarn build
      - name: Publish preview package
        run: |
          npx pkg-pr-new publish './packages/cherry-markdown' --compact --packageManager=pnpm,npm,yarn
