# =============================================================================
# Release — 正式发布编排器
#
# 触发时机: push 到 main 分支（需有 changeset 变更）
# 功能:
#   - 使用 Changesets 进行版本管理和 tag 推送
#   - 按发布的包名分别调用子工作流:
#     • cherry-markdown → reusable-npm-release.yml
#     • @cherry-markdown/client → reusable-client-build.yml (mode=release)
#     • cherry-markdown-vscode-plugin → reusable-vscode-plugin.yml (mode=release)
#   - 发布完成后强制同步 main → dev（仅在有包发布时执行）
# =============================================================================

name: 'Release'

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # 不需要在fork仓库的pr中运行, 仅当pr合并时运行
    if: github.repository == 'Tencent/cherry-markdown'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      publishedClientVersion: ${{ steps.extract_version.outputs.clientVersion }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: yarn

      - name: Check for changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn changeset-version
          title: "chore: release"
          commit: "chore: release"
          publish: yarn changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Version Output
        id: extract_version
        run: |
          clientVersion=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | select(.name=="@cherry-markdown/client") | .version')
          echo "clientVersion=$clientVersion" >> $GITHUB_OUTPUT

          # Debugging output
          echo "publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}"
          echo "clientVersion=$clientVersion"

  build-core-release:
    needs: release
    if: ${{ contains(needs.release.outputs.publishedPackages, '"name":"cherry-markdown"') }}
    uses: ./.github/workflows/reusable-npm-release.yml
    secrets: inherit

  build-client-release:
    needs: release
    if: ${{ contains(needs.release.outputs.publishedPackages, '"name":"@cherry-markdown/client"') }}
    uses: ./.github/workflows/reusable-client-build.yml
    with:
      mode: release
      client_version: ${{ needs.release.outputs.publishedClientVersion }}
    secrets: inherit

  build-vscodePlugin-release:
    needs: release
    if: ${{ contains(needs.release.outputs.publishedPackages, '"name":"cherry-markdown-vscode-plugin"') }}
    uses: ./.github/workflows/reusable-vscode-plugin.yml
    with:
      mode: release
    secrets: inherit

  # 仅当有实际版本发布时才同步 main 到 dev，避免意外覆盖 dev
  sync-main-to-dev:
    needs: release
    if: needs.release.outputs.publishedPackages != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: Sync main to dev
        run: |
          git fetch origin dev
          git checkout -B dev origin/main
          git push origin dev --force
