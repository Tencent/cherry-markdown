# =============================================================================
# PR Preview: Deploy — 部署预览并发布 PR 评论汇总
#
# 触发时机: 由 pr-preview-build 完成后自动触发 (workflow_run)
# 功能:
#   1. 下载 playground artifact → 部署到 surge.sh（多页面在线预览）
#   2. 收集 Client / VSCode Plugin 的 artifact 下载链接
#   3. 在 PR 中维护一条统一评论，包含所有资源链接（每次 commit 更新）
# 关联: 监听 name 为 "PR Preview: Build" 的 workflow 运行完成事件
# =============================================================================

name: 'PR Preview: Deploy'

on:
  workflow_run:
    workflows:
      - 'PR Preview: Build'
    types:
      - completed

jobs:
  preview-success:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      pr_id: ${{ steps.pr.outputs.id }}
    steps:
      - name: download pr id
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: ${{ github.event.workflow_run.workflow_id }}
          run_id: ${{ github.event.workflow_run.id }}
          name: pr-id

      - name: output pr id
        id: pr
        run: echo "id=$(<pr-id.txt)" >> $GITHUB_OUTPUT

      - name: Download playground
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: ${{ github.event.workflow_run.workflow_id }}
          run_id: ${{ github.event.workflow_run.id }}
          name: playground

      - id: deploy
        run: |
          export DEPLOY_DOMAIN=https://preview-pr-${{ steps.pr.outputs.id }}-cherry-markdown.surge.sh
          npx surge --project ./ --domain $DEPLOY_DOMAIN --token ${{ secrets.SURGE_TOKEN }}
          echo "url=$DEPLOY_DOMAIN" >> $GITHUB_OUTPUT

      - name: Collect all artifact download links
        id: collect-artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = ${{ github.event.workflow_run.id }};

            const { data: artifactList } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId
            });

            const clientArtifacts = [];
            const vscodeArtifacts = [];

            for (const artifact of artifactList.artifacts) {
              const url = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
              const name = artifact.name;

              if (name.startsWith('client-')) {
                clientArtifacts.push({ name, url, size: artifact.size_in_bytes });
              } else if (name === 'vscode-plugin-vsix') {
                vscodeArtifacts.push({ name, url, size: artifact.size_in_bytes });
              }
            }

            core.setOutput('client_count', clientArtifacts.length);
            core.setOutput('vscode_count', vscodeArtifacts.length);

            // Build client table rows
            let clientRows = '';
            const platformMap = { 'macos': 'macOS', 'windows': 'Windows', 'linux': 'Linux' };
            const archMap = { 'arm64': 'Apple Silicon', 'x64': 'x64' };
            const typeLabels = {
              'dmg': 'DMG 安装包',
              'app': 'App 应用',
              'msi': 'MSI 安装包',
              'exe': 'EXE 安装程序',
              'appimage': 'AppImage',
              'deb': 'Deb 包'
            };

            // Sort: macOS first, then Windows, then Linux; arm64 before x64
            const platformOrder = ['macos', 'windows', 'linux'];
            const archOrder = ['arm64', 'x64'];
            clientArtifacts.sort((a, b) => {
              const [aPlatform, aArch, aType] = a.name.replace('client-', '').split('-');
              const [bPlatform, bArch, bType] = b.name.replace('client-', '').split('-');
              const pDiff = platformOrder.indexOf(aPlatform) - platformOrder.indexOf(bPlatform);
              if (pDiff !== 0) return pDiff;
              const aDiff = archOrder.indexOf(aArch) - archOrder.indexOf(bArch);
              if (aDiff !== 0) return aDiff;
              return 0;
            });

            for (const artifact of clientArtifacts) {
              const parts = artifact.name.replace('client-', '').split('-');
              const platform = parts[0];
              const arch = parts[1];
              const type = parts.slice(2).join('-');
              const platformLabel = platformMap[platform] || platform;
              const archLabel = archMap[arch] || arch;
              const typeLabel = typeLabels[type] || type;
              clientRows += `| ${platformLabel} | ${archLabel} | ${typeLabel} | [下载](${artifact.url}) |\n`;
            }
            core.setOutput('client_rows', clientRows);

            // Build vscode rows
            let vscodeRows = '';
            for (const artifact of vscodeArtifacts) {
              vscodeRows += `| [下载 .vsix](${artifact.url}) |\n`;
            }
            core.setOutput('vscode_rows', vscodeRows);

      - uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.BOT_TOKEN }}
          body: |
            ### 🌐 Playground 预览
            * [完整版](${{steps.deploy.outputs.url}}/index.html)
            * [基础](${{steps.deploy.outputs.url}}/basic.html)
            * [移动端](${{steps.deploy.outputs.url}}/h5.html)
            * [多实例](${{steps.deploy.outputs.url}}/multiple.html)
            * [无工具栏](${{steps.deploy.outputs.url}}/notoolbar.html)
            * [纯预览模式](${{steps.deploy.outputs.url}}/preview_only.html)
            * [XSS 测试](${{steps.deploy.outputs.url}}/xss.html)（默认禁用，需配置后允许）
            * [图片编辑](${{steps.deploy.outputs.url}}/img.html)
            * [表格编辑](${{steps.deploy.outputs.url}}/table.html)
            * [自动编号标题](${{steps.deploy.outputs.url}}/head_num.html)
            * [流式输入模式（AI chat 场景）](${{steps.deploy.outputs.url}}/ai_chat.html)
            * [VIM 编辑模式](${{steps.deploy.outputs.url}}/vim.html)
            * [使用自带或自定义的 Mermaid.js](${{steps.deploy.outputs.url}}/mermaid.html)
            * [自定义代码块外层容器](${{steps.deploy.outputs.url}}/custom_codeblock_wrapper.html)
            * [流式输出包](${{steps.deploy.outputs.url}}/ai_chat_stream.html)

            ### 💻 Client 构建产物${{ steps.collect-artifacts.outputs.client_count > 0 && '' || '（⚠️ 构建失败或未生成产物）' }}
            ${{ steps.collect-artifacts.outputs.client_count > 0 && '| 平台 | 架构 | 产物类型 | 下载 |\n|------|------|----------|------|\n' || '' }}${{ steps.collect-artifacts.outputs.client_rows }}
            ${{ steps.collect-artifacts.outputs.client_count > 0 && '> ⏰ 产物保留 5 天' || '' }}

            ### 🔌 VSCode Plugin 构建产物${{ steps.collect-artifacts.outputs.vscode_count > 0 && '' || '（⚠️ 构建失败或未生成产物）' }}
            ${{ steps.collect-artifacts.outputs.vscode_count > 0 && steps.collect-artifacts.outputs.vscode_rows || '' }}
            <!-- [工作流地址](${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}}) -->
            <!-- AUTO_PREVIEW_HOOK -->
          number: ${{ steps.pr.outputs.id }}
          body-include: '<!-- AUTO_PREVIEW_HOOK -->'

  preview-failed:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: download pr id
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: ${{ github.event.workflow_run.workflow_id }}
          run_id: ${{ github.event.workflow_run.id }}
          name: pr-id

      - name: output pr id
        id: pr
        run: echo "id=$(<pr-id.txt)" >> $GITHUB_OUTPUT

      - name: The job failed
        uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.BOT_TOKEN }}
          body: |
            ❌ **PR Preview 构建失败**
            <!-- [工作流地址](${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}}) -->
            <!-- AUTO_PREVIEW_HOOK -->
          number: ${{ steps.pr.outputs.id }}
          body-include: '<!-- AUTO_PREVIEW_HOOK -->'
