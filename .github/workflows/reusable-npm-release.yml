# Reusable Workflow: NPM Release — cherry-markdown 核心包 npm 发布
# 使用 OIDC Trusted Publisher 进行 npm 认证，无需 NPM_TOKEN

name: 'Reusable: npm Release'

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  release-npm-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Install and build
        run: yarn install && yarn build

      - name: Prepare package for publish
        working-directory: ./packages/cherry-markdown
        run: |
          cp ../../README*.md .
          tmp=$(mktemp) && jq '.publishConfig = {"registry":"https://registry.npmjs.org","access":"public","provenance":true}' \
            package.json > "$tmp" && mv "$tmp" package.json

      - name: Publish cherry-markdown
        working-directory: ./packages/cherry-markdown
        run: NODE_AUTH_TOKEN="" npm publish --access public --provenance --no-workspaces
