# =============================================================================
# Reusable Workflow: NPM Release — cherry-markdown 核心包 npm 发布
#
# 触发时机: 被 release.yml 调用 (workflow_call)
# 功能: 构建 cherry-markdown 并发布到 npm registry
#       使用 OIDC (id-token) 进行 npm 认证，无需 NPM_TOKEN
#       构建和发布均使用 .node-version(20) 确保产物兼容性
# 前提: npm 包需在 npmjs.com 配置 Publishing access → GitHub Actions
# =============================================================================

name: 'Reusable: npm Release'

on:
  workflow_call:

jobs:
  release-npm-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          cache: yarn

      - name: Install and build
        run: |
          yarn
          yarn build

      - name: Publish cherry-markdown
        run: |
          cp README*.md packages/cherry-markdown/
           
          cd packages/cherry-markdown
          npm publish --access public --provenance
