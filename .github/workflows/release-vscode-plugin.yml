# =============================================================================
# Release: VSCode Plugin — VSCode 插件 vsce 发布
#
# 触发时机: 被 release.yml 调用 (workflow_call)
# 功能: 构建并发布 Cherry Markdown VSCode 插件到 VSCode Marketplace
#
# 流程: build → build:prod → 改名 → vsce publish
# =============================================================================

name: 'Release: VSCode Plugin'

on:
  workflow_call:

jobs:
  release-vscode-plugin-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      # 用原始包名安装依赖和构建（workspace 解析正常）
      - name: Install and Build Dependencies
        run: |
          yarn --network-timeout 100000
          yarn build

      # 编译生产产物（纯 rspack 构建）
      - name: Build VSCode Plugin (production bundle)
        run: |
          yarn workspace cherry-markdown-vscode-plugin build:prod

      # 改名为 "cherry-markdown"（VSCode Marketplace 发布名）
      - name: Prepare for VSCode publishing
        run: bash .github/scripts/prepare-vscode-plugin.sh

      - name: Publish VSCode Plugin
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd packages/vscodePlugin
          npx @vscode/vsce publish -p $VSCE_PAT --no-dependencies --no-yarn
