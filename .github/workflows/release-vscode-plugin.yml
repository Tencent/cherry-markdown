# =============================================================================
# Release: VSCode Plugin — VSCode 插件 vsce 发布
#
# 触发时机: 被 release.yml 调用 (workflow_call)
# 功能: 构建并发布 Cherry Markdown VSCode 插件到 VSCode Marketplace
#
# 关键: vsce 会触发 prepublish → yarn package → 检测到 workspace 重名冲突
#       所以必须在 vsce 之前：改名 + 删除 prepublish 脚本
# =============================================================================

name: 'Release: VSCode Plugin'

on:
  workflow_call:

jobs:
  release-vscode-plugin-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      # 用原始包名安装依赖和构建（workspace 解析正常）
      - name: Install and Build Dependencies
        run: |
          yarn global add @vscode/vsce
          yarn --network-timeout 100000
          yarn build

      # 直接调用 compile+package，跳过 vsce（避免触发 prepublish 导致 workspace 重名冲突）
      - name: Build VSCode Plugin (compile + production bundle)
        run: |
          yarn workspace cherry-markdown-vscode-plugin compile
          yarn workspace cherry-markdown-vscode-plugin package

      # 改名 + 移除 prepublish 脚本（防止 vsce 触发 yarn package → workspace 重名冲突）
      - name: Prepare for VSCode publishing
        run: |
          cd packages/vscodePlugin

          # ① 改 name 为 "cherry-markdown"（VSCode Marketplace 发布名）
          tmp=$(mktemp) && jq '.name = "cherry-markdown"' package.json > "$tmp" && mv "$tmp" package.json

          # ② 备份并移除 vscode:prepublish（否则 vsce 触发它 → yarn package → 重名冲突）
          tmp=$(mktemp) && jq '
            .scripts["vscode:prepublish"] = null | 
            .scripts | with_entries(select(.value == null)) | del(.[])
          ' package.json > "$tmp" && mv "$tmp" package.json || true
          # 简化版：直接删除 key
          tmp=$(mktemp) && jq 'del(.scripts["vscode:prepublish"])' package.json > "$tmp" && mv "$tmp" package.json

          echo "✅ name changed to cherry-markdown, prepublish removed"

      - name: Publish VSCode Plugin
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd packages/vscodePlugin
          vsce publish -p $VSCE_PAT --no-dependencies --no-yarn
