# =============================================================================
# PR: CI Check — ESLint 代码规范检查 + 多版本 Node 构建验证
#
# 触发时机: push 到 main/dev 分支 / 提交 PR 时自动运行
# 功能: 在 Node 18/20/22 三个版本上分别执行 lint 和 build，确保跨版本兼容性
# 并发控制: 同一分支的连续提交会取消旧的运行，节省 CI 资源
# =============================================================================

name: 'PR: CI Check'

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # 18: 项目最低兼容版本 (EOL但仍需支持)
        # 20: 广泛使用的 LTS (安全支持至 2026-04-30)
        # 22: 当前 Maintenance LTS (安全支持至 2027-04)

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn

      - name: Eslint
        run: yarn lint:all

      - name: Build
        run: yarn build
