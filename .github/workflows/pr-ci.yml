# =============================================================================
# PR: CI Check — ESLint 代码规范检查 + 多版本 Node 构建验证
#
# 触发时机: push 到 main/dev 分支 / 提交 PR 时自动运行
# 功能: 在 Node 22/24 两个版本上分别执行 lint 和 build，确保跨版本兼容性
# 并发控制: 同一分支的连续提交会取消旧的运行，节省 CI 资源
# =============================================================================

name: 'PR: CI Check'

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [lts/*, 24.x]
        # lts/*: 当前最新 Active LTS（自动跟随）
        # 24.x: 固定开发基准版本

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn

      - name: Eslint
        run: yarn lint:all

      - name: Build
        run: yarn build
