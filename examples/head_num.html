<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cherry Editor - Markdown Editor</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      video {
        max-width: 400px;
      }

      #demo-val {
        display: none;
      }

      img {
        max-width: 100%;
      }
    </style>
    <link rel="Shortcut Icon" href="./logo/favicon.ico" />
    <link rel="Shortcut Icon" href="../logo/favicon.ico" />
    <link rel="Bookmark" href="../logo/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.12.0/dist/katex.min.css"
      integrity="sha384-AfEj0r4/OFrOo5t7NnNe46zW/tFgW6x/bCJG8FqQCEo3+Aro6EYUG4+cU+KJWu/X"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div id="dom_mask" style="position: absolute; top: 40px; height: 20px; width: 100%"></div>
    <div id="markdown"></div>
  </body>
  <script type="module">
    import { initCherry, loadMarkdown } from './assets/scripts/cherry-loader.js';

    const Cherry = await initCherry();
    const headAutoNumMd = await loadMarkdown('./assets/markdown/head-auto-num.md');

    const cherry = new Cherry({
      id: 'markdown',
      engine: {
        syntax: {
          header: {
            anchorStyle: 'autonumber',
          },
          toc: {
            showAutoNumber: true
          }
        }
      },
      toolbars: {
        showAutoNumber: true
      },
      value: headAutoNumMd,
    });
  </script>
</html>
