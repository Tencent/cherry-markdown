<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图片所见即所得编辑</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #markdown {
        margin-top: 5%;
        width: 70%;
        margin-left: auto;
        margin-right: auto;
      }
    </style>
    <link rel="Shortcut Icon" href="./logo/favicon.ico" />
    <link rel="Shortcut Icon" href="../logo/favicon.ico" />
    <link rel="Bookmark" href="../logo/favicon.ico" />
  </head>

  <body>
    <div id="dom_mask" style="position: absolute; top: 40px; height: 20px; width: 100%"></div>
    <div id="markdown"></div>
    <script type="module">
      import { createCherry, loadMarkdown } from './assets/scripts/cherry-loader.js';
      import { imgConfig } from './assets/scripts/img-demo.js';

      const imgMd = await loadMarkdown('./assets/markdown/img.md');
      const config = Object.assign({}, imgConfig, { value: imgMd });
      await createCherry(config);
    </script>
  </body>
</html>
